<main>
  <div class="trade-page-wrap">
    <div class="g-card">

      <h2 style="text-align:center; font-weight:800; margin-bottom:var(--space-lg);">
        <span style="font-size:1.6rem;">⚡</span> Place Order
      </h2>

      <form method="POST" action="submit_order.php" id="buy-sell-form" class="trade-form">

        <!-- Buy / Sell Toggle -->
        <div class="type-toggle">
          <input type="radio" name="type" value="buy" id="type-buy" checked>
          <label for="type-buy" class="toggle-label-buy">Buy</label>
          <input type="radio" name="type" value="sell" id="type-sell">
          <label for="type-sell" class="toggle-label-sell">Sell</label>
        </div>

        <div class="form-group">
          <label for="order_type">Order Type</label>
          <select name="order_type" id="order_type" class="g-select">
            <option value="market">Market</option>
            <option value="limit">Limit</option>
          </select>
        </div>

        <div class="form-group">
          <label for="coin">Coin</label>
          <select name="coin" id="coin" class="g-select">
            <option value="BTC">BTC — Bitcoin</option>
            <option value="ETH">ETH — Ethereum</option>
          </select>
        </div>

        <div class="form-group">
          <label for="amount">Amount (Coins)</label>
          <input type="number" step="0.0001" name="amount" id="amount" required class="g-input" placeholder="0.00">
        </div>

        <div class="form-group">
          <label for="price">Price (USDT)</label>
          <input type="number" step="0.01" name="price" id="price" class="g-input" placeholder="Auto-filled for Market orders">
        </div>

        <div class="form-group">
          <label>Estimated Total</label>
          <div class="total-display" id="totalDisplay">$0.00</div>
        </div>

        <button type="submit" class="g-btn g-btn-primary submit-btn">Submit Order</button>
      </form>

    </div>
  </div>
